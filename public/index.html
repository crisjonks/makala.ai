<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>makala.ai</title>
<link rel="icon" href="/makala.ico" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>

<style>
:root{
  --bg:#11131c;
  --panel:#171a26;
  --panel2:#141827;
  --line:rgba(255,255,255,.08);
  --text:#f7f8fb;
  --muted:#aab2c3;
  --accent:#8b5cf6;
  --accent2:#22d3ee;
  --user:#1e2434;
  --user2:#161b28;
  --bot:#151824;
  --radius:16px;
  --font:Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;overflow:hidden;font-family:var(--font);color:var(--text);background:linear-gradient(180deg,var(--bg),#0b0d14)}
button,input,textarea,select{font:inherit;color:inherit}
button{cursor:pointer}
body.theme-pink{--bg:#12111b;--panel:#171525;--panel2:#11111d;--accent:#ff4fa8;--accent2:#ff7fca;--user:#261235;--user2:#171022;--bot:#181425}
body.theme-deep{--bg:#090a10;--panel:#10131b;--panel2:#0a0d13;--accent:#a78bfa;--accent2:#60a5fa;--user:#141822;--user2:#0d1017;--bot:#10131b}
body.theme-blue{--bg:#0d1422;--panel:#111b2d;--panel2:#0b1322;--accent:#60a5fa;--accent2:#93c5fd;--user:#13284a;--user2:#0c1a31;--bot:#101c32}
body.theme-red{--bg:#170909;--panel:#211010;--panel2:#160a0a;--accent:#fb7185;--accent2:#fda4af;--user:#361111;--user2:#230b0b;--bot:#1e1010}
body.theme-green{--bg:#08130f;--panel:#101b18;--panel2:#0b1512;--accent:#34d399;--accent2:#86efac;--user:#11241e;--user2:#0b1612;--bot:#101a17}

.app{
  width:min(1380px, calc(100vw - 12px));
  height:calc(100vh - 12px);
  margin:6px auto;
  display:grid;
  grid-template-columns:268px 1fr;
  gap:8px;
  min-height:0;
}
.sidebar,.panel{
  min-height:0;
  border:1px solid var(--line);
  background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.012));
  border-radius:var(--radius);
  overflow:hidden;
}
.sidebar{
  display:flex;
  flex-direction:column;
  padding:12px;
}
.top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  padding-bottom:10px;
}
.title{
  font-size:14px;
  font-weight:600;
  letter-spacing:.2px;
}
.btn{
  height:38px;
  padding:0 12px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.03);
  border-radius:12px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:transform .14s ease, background .14s ease, border-color .14s ease, opacity .14s ease;
}
.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.06)}
.btn:active{transform:translateY(0)}
.btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent2));border-color:transparent}
.btn.icon{width:38px;padding:0}
.btn.compact{height:34px;padding:0 10px;border-radius:10px;font-size:13px}
.btn.full{width:100%}
.icon-plus{font-size:24px;line-height:1;display:block;margin-top:-1px}

.conv-list{
  flex:1;
  min-height:0;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
  padding-right:2px;
}
.conv-item,.home-item{
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(255,255,255,.02);
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
}
.conv-item.active,.home-item.active{
  background:rgba(255,255,255,.07);
  border-color:rgba(255,255,255,.18);
}
.conv-item img{width:26px;height:26px;border-radius:8px;object-fit:cover;flex:0 0 auto}
.home-icon{
  width:26px;height:26px;border-radius:8px;display:grid;place-items:center;
  background:rgba(255,255,255,.04);font-size:15px;flex:0 0 auto
}
.conv-copy{min-width:0;flex:1}
.conv-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-meta{font-size:11px;color:var(--muted)}
.conv-delete{width:18px;height:18px;flex:0 0 auto;opacity:.95}

.sidebar-footer{
  display:grid;
  gap:8px;
  padding-top:10px;
}
.makalina-launch{
  border:1px solid var(--line);
  background:rgba(255,255,255,.03);
  border-radius:14px;
  padding:6px;
  display:block;
  width:100%;
}
.makalina-launch img{
  width:100%;
  height:74px;
  object-fit:contain;
  display:block;
}
.makalina-launch:hover{transform:translateY(-1px);background:rgba(255,255,255,.06)}
.sidebar-footer .stack{display:grid;gap:8px;grid-template-columns:1fr 1fr}

.panel{
  display:flex;
  flex-direction:column;
}
.topbar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-bottom:1px solid var(--line);
  min-height:58px;
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}
.brand img{width:28px;height:28px;border-radius:8px;display:block}
.brand h1{
  margin:0;
  font-size:16px;
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.right-tools{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
select,input,textarea{
  background:rgba(2,6,23,.96);
  color:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  outline:none;
}
select, input[type=text]{height:38px;padding:0 12px}
select option{background:#050814;color:#fff}
.home-select{
  width:166px;
}
.chat{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
}
.hidden{display:none !important}

.empty-state{
  flex:1;
  min-height:0;
  display:grid;
  place-items:center;
  padding:16px;
}
.empty-card{
  width:min(780px,100%);
  display:grid;
  gap:14px;
  text-align:center;
  justify-items:stretch;
}
.empty-card h2{
  margin:0;
  font-size:40px;
  letter-spacing:-.04em;
}
.empty-card p{
  margin:0;
  color:var(--muted);
  font-size:14px;
}
.home-input,.composer textarea{
  width:100%;
  min-height:70px;
  padding:14px;
  border-radius:16px;
  line-height:1.45;
  font-size:15px;
  resize:none;
  overflow:hidden;
}
.home-input{min-height:76px}
.suggestions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}
.suggestion{
  border:1px solid var(--line);
  background:rgba(255,255,255,.03);
  border-radius:999px;
  color:#fff;
  padding:10px 14px;
  cursor:pointer;
  font-size:13px;
  transition:transform .14s ease, background .14s ease;
}
.suggestion:hover{background:rgba(255,255,255,.06);transform:translateY(-1px)}

.message-wrap{
  flex:1;
  min-height:0;
  overflow:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.message-row{
  width:100%;
  min-width:0;
  display:flex;
  gap:10px;
  align-items:flex-start;
}
.message-row.user{justify-content:flex-end}
.message-row.bot{justify-content:flex-start}
.message-row.fade-in{animation:msgIn .18s ease-out both}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.user-bubble{
  max-width:min(72%,680px);
  min-width:0;
  display:inline-block;
  padding:9px 12px;
  border-radius:18px 18px 6px 18px;
  background:linear-gradient(180deg,var(--user),var(--user2));
  border:1px solid var(--line);
  line-height:1.45;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
  word-break:break-word;
  font-weight:400;
}
.bot-card{
  max-width:min(76%,760px);
  min-width:0;
  display:grid;
  grid-template-columns:28px 1fr;
  gap:10px;
  align-items:start;
}
.bot-avatar{
  width:28px;
  height:28px;
  border-radius:8px;
  display:block;
  object-fit:cover;
}
.bot-meta{
  display:grid;
  gap:4px;
  justify-items:start;
  min-width:0;
}
.bot-body{
  min-width:0;
  font-size:14px;
  line-height:1.45;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
  word-break:break-word;
  font-weight:400;
}
.bot-body p,.bot-body ul,.bot-body ol,.bot-body blockquote,.bot-body pre,.bot-body hr,.bot-body h1,.bot-body h2,.bot-body h3,.bot-body h4{margin:0 0 4px 0}
.bot-body p:last-child{margin-bottom:0}
.bot-body pre{
  background:rgba(255,255,255,.03);
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  overflow:auto;
  position:relative;
}
.bot-body code{
  font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  font-size:.95em;
}
.copy-code{
  position:absolute;
  right:8px;
  top:8px;
  width:24px;
  height:24px;
  border:1px solid var(--line);
  border-radius:8px;
  background:rgba(0,0,0,.15);
  display:grid;
  place-items:center;
  cursor:pointer;
}
.copy-code img{width:14px;height:14px;display:block}

.typing-shell{
  display:grid;
  grid-template-columns:28px 1fr;
  gap:10px;
  align-items:start;
}
.typing-avatar{
  width:28px;height:28px;border-radius:8px;display:block;object-fit:cover
}
.typing-line{
  min-height:28px;
  display:flex;
  align-items:center;
  color:var(--muted);
  font-size:13px;
}
.typing-dots{
  display:inline-flex;
  gap:6px;
  align-items:center;
}
.typing-dots span{
  width:7px;height:7px;border-radius:50%;
  background:var(--muted);
  animation:bounce 1s infinite ease-in-out;
}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{
  0%,80%,100%{transform:translateY(0);opacity:.45}
  40%{transform:translateY(-4px);opacity:1}
}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.composer{
  padding:12px;
  border-top:1px solid var(--line);
}
.composer-row{
  display:flex;
  gap:10px;
  align-items:flex-end;
}
.composer textarea{
  flex:1;
  min-height:46px;
  max-height:140px;
  padding:12px 12px;
  line-height:1.4;
  font-size:15px;
}

.modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(3,6,13,.68);
  display:grid;
  place-items:center;
  z-index:50;
  padding:16px;
}
.modal{
  width:min(760px,100%);
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--line);
  border-radius:22px;
  overflow:hidden;
  transform-origin:center;
}
.modal.show{animation:modalIn .18s ease-out both}
@keyframes modalIn{
  from{opacity:0;transform:scale(.98) translateY(6px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.modal-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:16px 18px;
  border-bottom:1px solid var(--line);
}
.modal-head h3{margin:0;font-size:18px}
.modal-body{
  padding:18px;
  display:grid;
  gap:14px;
}
.buy-grid{
  display:grid;
  grid-template-columns:1.05fr .95fr;
  gap:14px;
}
.buy-hero{
  background:rgba(255,255,255,.03);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  display:grid;
  gap:12px;
}
.buy-hero img{
  width:100%;
  height:auto;
  border-radius:16px;
  display:block;
  object-fit:contain;
  max-height:260px;
}
.buy-card{
  background:rgba(255,255,255,.03);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
  display:grid;
  gap:12px;
}
.field{
  width:100%;
  height:40px;
  padding:0 12px;
  border-radius:12px;
  background:rgba(2,6,23,.96);
  border:1px solid var(--line);
  color:#fff;
}
.field::placeholder{color:#8792a8}
.textarea-field{
  width:100%;
  min-height:88px;
  padding:12px;
  border-radius:16px;
  resize:none;
}
.row{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}
.inline-grow{flex:1;min-width:160px}
.select-file{
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  background:rgba(255,255,255,.03);
  border:1px solid var(--line);
  border-radius:12px;
  padding:0 14px;
}
.select-file:hover{background:rgba(255,255,255,.06)}
.file-input{display:none}
.totals{display:grid;gap:6px;padding-top:4px}
.totals .muted{color:var(--muted);font-size:13px}
.purchase-btn{
  height:42px;
  padding:0 14px;
  border-radius:12px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#fff;
  border:0;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-weight:600;
}
.purchase-btn.loading{pointer-events:none}
.spinner{
  width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(255,255,255,.35);
  border-top-color:#fff;
  animation:spin .8s linear infinite;
}
.news-btn{
  height:40px;
  padding:0 12px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.03);
  color:#fff;
  border-radius:12px;
  width:100%;
}

@media (max-width: 1000px){
  body{padding:4px}
  .app{
    width:100vw;
    height:100vh;
    grid-template-columns:1fr;
    grid-template-rows:auto 1fr;
  }
  .sidebar{order:2}
  .panel{order:1}
  .empty-card h2{font-size:32px}
  .message-row.user .user-bubble{max-width:92%}
  .buy-grid{grid-template-columns:1fr}
}
</style>
</head>
<body class="theme-pink">
<div class="app">
  <aside class="sidebar">
    <div class="top">
      <div class="title">Conversations</div>
      <button id="newConvBtn" class="btn icon" title="New conversation"><span class="icon-plus">+</span></button>
    </div>

    <div id="convList" class="conv-list"></div>

    <div class="sidebar-footer">
      <button id="newsBtn" class="news-btn">News</button>
      <button id="makalinaLaunchBtn" class="makalina-launch hidden" title="Buy makalina">
        <img src="makalina.png" alt="makalina">
      </button>
      <div class="stack">
        <button id="tttBtn" class="btn hidden">tic-tac-toe</button>
      </div>
    </div>
  </aside>

  <main class="panel" id="panelRoot">
    <div class="topbar">
      <div class="brand">
        <img src="makala.png" alt="makala">
        <h1 id="activeTitle">makala.ai</h1>
      </div>
      <div class="right-tools">
        <select id="personaSelect" aria-label="Personality">
          <option value="makala">makala</option>
          <option value="makalina">makalina</option>
        </select>
        <select id="themeSelect" aria-label="Theme" class="home-select">
          <option value="pink">purple & pink</option>
          <option value="deep">deep black</option>
          <option value="blue">navy blue</option>
          <option value="red">dark red</option>
          <option value="green">dark green</option>
        </select>
        <button id="clearBtn" class="btn">clear chats</button>
      </div>
    </div>

    <div id="chatView" class="chat">
      <div id="emptyState" class="empty-state">
        <div class="empty-card">
          <h2>Ready when you are</h2>
          <p>Ask something, start a conversation, or pick a suggestion.</p>
          <textarea id="homeInput" class="home-input" placeholder="Type here to start..." aria-label="Start a conversation"></textarea>
          <div class="suggestions">
            <button class="suggestion" data-prompt="Help me plan a study schedule.">Help me plan a study schedule.</button>
            <button class="suggestion" data-prompt="Explain photosynthesis simply.">Explain photosynthesis simply.</button>
            <button class="suggestion" data-prompt="Give me three story ideas.">Give me three story ideas.</button>
          </div>
          <button id="homeSendBtn" class="btn primary">Start chat</button>
        </div>
      </div>

      <div id="messageWrap" class="message-wrap hidden" aria-live="polite"></div>

      <div id="composer" class="composer hidden">
        <div class="composer-row">
          <textarea id="messageInput" placeholder="Ask me anything..." aria-label="Message"></textarea>
          <button id="sendBtn" class="btn primary">send</button>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="modalRoot"></div>

<script>
const $ = (s, root=document) => root.querySelector(s);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const trimLines = s => String(s ?? '').replace(/\r/g, '').replace(/\n+$/,'');
const STORAGE_KEY = 'makala_conversations_simple_v3';

marked.setOptions({
  gfm: true,
  breaks: true
});

const state = {
  conversations: [],
  activeId: null,
  theme: localStorage.getItem('makala_theme') || 'pink',
  makalinaOwned: localStorage.getItem('makala_makalina_owned') === '1',
  profileName: localStorage.getItem('makala_profile_name') || '',
  profileImage: localStorage.getItem('makala_profile_image') || ''
};

const els = {
  convList: $('#convList'),
  newConvBtn: $('#newConvBtn'),
  themeSelect: $('#themeSelect'),
  personaSelect: $('#personaSelect'),
  clearBtn: $('#clearBtn'),
  activeTitle: $('#activeTitle'),
  emptyState: $('#emptyState'),
  messageWrap: $('#messageWrap'),
  composer: $('#composer'),
  messageInput: $('#messageInput'),
  homeInput: $('#homeInput'),
  homeSendBtn: $('#homeSendBtn'),
  modalRoot: $('#modalRoot'),
  panelRoot: $('#panelRoot'),
  newsBtn: $('#newsBtn'),
  makalinaLaunchBtn: $('#makalinaLaunchBtn'),
  tttBtn: $('#tttBtn')
};

function setTheme(theme){
  state.theme = theme;
  document.body.className = `theme-${theme}`;
  els.themeSelect.value = theme;
  localStorage.setItem('makala_theme', theme);
}

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    conversations: state.conversations,
    activeId: state.activeId
  }));
  localStorage.setItem('makala_theme', state.theme);
  localStorage.setItem('makala_makalina_owned', state.makalinaOwned ? '1' : '0');
  localStorage.setItem('makala_profile_name', state.profileName || '');
  localStorage.setItem('makala_profile_image', state.profileImage || '');
}

function loadState(){
  try{
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    state.conversations = Array.isArray(raw.conversations) ? raw.conversations : [];
    state.activeId = raw.activeId || null;
  }catch{
    state.conversations = [];
    state.activeId = null;
  }

  if(!state.conversations.length){
    state.activeId = null;
  }
  if(state.activeId && !state.conversations.some(c => c.id === state.activeId)){
    state.activeId = state.conversations[0]?.id || null;
  }
}

function createConversation(title='New conversation'){
  const conv = {
    id: uid(),
    title,
    persona: 'makala',
    createdAt: Date.now(),
    messages: []
  };
  state.conversations.unshift(conv);
  state.activeId = conv.id;
  saveState();
  return conv;
}

function activeConversation(){
  return state.conversations.find(c => c.id === state.activeId) || null;
}

function escapeHTML(s){
  return String(s ?? '').replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'
  }[m]));
}

function relativeTime(ts){
  const now = Date.now();
  const diff = Math.max(0, now - ts);
  const minutes = Math.floor(diff / 60000);
  if(minutes < 1) return 'Just now';
  if(minutes < 60) return `${minutes}m ago`;
  const hours = Math.floor(minutes / 60);
  if(hours < 24) return `${hours}h ago`;
  const days = Math.floor(hours / 24);
  if(days === 1) return 'Yesterday';
  if(days < 7) return `${days}d ago`;
  if(days < 30) return `${Math.floor(days / 7)}w ago`;
  if(days < 365) return `${Math.floor(days / 30)}mo ago`;
  return 'A long time ago';
}

function personaLabel(persona){
  return persona === 'makalina' ? 'makalina' : 'makala';
}
function personaAvatar(persona){
  return persona === 'makalina' ? 'makalina.png' : 'makala.png';
}

function buildSystemPrompt(persona){
  const countryNote = localStorage.getItem('makala_country_note') || '';
  if(persona === 'makalina'){
    return [
      'You are Makalina, a more matured version of Makala.',

function addCodeCopyButtons(root){
  root.querySelectorAll('pre').forEach(pre => {
    if(pre.querySelector('.copy-code')) return;
    const btn = document.createElement('button');
    btn.className = 'copy-code';
    btn.type = 'button';
    btn.title = 'Copy code';
    btn.innerHTML = `<img src="copy.png" alt="">`;
    btn.addEventListener('click', async () => {
      const code = pre.querySelector('code');
      if(!code) return;
      try{
        await navigator.clipboard.writeText(code.textContent || '');
        btn.style.opacity = '0.7';
        setTimeout(() => btn.style.opacity = '1', 180);
      }catch{}
    });
    pre.appendChild(btn);
  });
}

async function sendMessage(value){
  const text = trimLines(value).trim();
  if(!text) return;

  let conv = activeConversation();
  if(!conv){
    conv = createConversation('New conversation');
  }

  if(conv.messages.length === 0 && conv.title === 'New conversation'){
    conv.title = text.split(/\s+/).slice(0, 4).join(' ');
  }

  conv.messages.push({ role:'user', content:text, createdAt: Date.now() });
  state.activeId = conv.id;
  saveState();
  renderAll();

  const typing = makeTypingRow(conv.persona);
  els.messageWrap.appendChild(typing);
  els.messageWrap.scrollTop = els.messageWrap.scrollHeight;

  try{
    const payload = {
      messages: [
        { role:'system', content: buildSystemPrompt(conv.persona) },
        ...conv.messages.map(m => ({ role:m.role, content:m.content }))
      ]
    };

    const resp = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });

    if(!resp.ok){
      const err = await resp.text();
      throw new Error(err || 'Chat request failed');
    }

    const data = await resp.json();
    const reply = data?.reply || 'No response.';
    conv.messages.push({ role:'assistant', content:reply, createdAt: Date.now() });
  }catch(err){
    conv.messages.push({ role:'assistant', content:`Error: ${String(err)}`, createdAt: Date.now() });
  }

  saveState();
  renderAll();

  const last = els.messageWrap.lastElementChild;
  if(last) last.classList.add('fade-in');
}

function openTicTacToe(){
  if(!state.makalinaOwned) return openBuyMakalina();

  const boardHTML = Array.from({length:9}).map((_,i)=>`<button class="ttt-cell" data-i="${i}" type="button"></button>`).join('');
  openModal(`
    <div class="modal-head">
      <h3>tic-tac-toe</h3>

    </div>
    <div class="modal-body">

          <div style="color:var(--muted)">You play <strong>O</strong>. Makalina plays <strong>X</strong>.</div>
          <button class="btn compact" id="tttReset">Reset</button>
        </div>
        <div id="tttBoard" class="ttt-board">${boardHTML}</div>
        <div id="tttStatus" style="min-height:24px;color:var(--muted)">Click a square to start.</div>
      </div>
    </div>
  `);

  const style = document.createElement('style');
  style.textContent = `
    .ttt-board{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:8px;
      width:min(100%, 360px);
      margin:0 auto;
    }
    .ttt-cell{
      aspect-ratio:1/1;
      border:1px solid var(--line);
      border-radius:14px;
      background:rgba(255,255,255,.03);
      display:grid;
      place-items:center;
      font-size:28px;
      font-weight:700;
      transition:transform .14s ease, background .14s ease;
      padding:0;
    }
    .ttt-cell:hover{transform:translateY(-1px);background:rgba(255,255,255,.06)}
    .ttt-cell:disabled{cursor:default;opacity:1}
    .ttt-cell.x img{width:38px;height:38px;object-fit:contain}
    .ttt-cell.o{color:#fff}
    .ttt-win{
      outline:2px solid var(--accent);
      background:rgba(255,255,255,.08);
    }
  `;
  document.head.appendChild(style);

  let stateBoard = Array(9).fill('');
  let over = false;

  const board = $('#tttBoard');
  const status = $('#tttStatus');
  const cells = [...board.querySelectorAll('.ttt-cell')];

  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  const check = (sym) => wins.find(line => line.every(i => stateBoard[i] === sym));

  const render = () => {
    cells.forEach((cell, i) => {
      cell.classList.remove('x','o','ttt-win');
      cell.innerHTML = '';
      if(stateBoard[i] === 'X'){
        cell.classList.add('x');
        const img = document.createElement('img');
        img.src = 'makalina.png';
        img.alt = 'X';
        cell.appendChild(img);
      }else if(stateBoard[i] === 'O'){
        cell.classList.add('o');
        cell.textContent = 'O';
      }
      cell.disabled = over || !!stateBoard[i];
    });
    const winX = check('X');
    const winO = check('O');
    if(winX || winO){
      (winX || winO).forEach(i => cells[i].classList.add('ttt-win'));
    }
  };

  const end = (text) => {
    over = true;
    status.textContent = text;
    render();
  };

  const aiMove = () => {
    if(over) return;
    const free = stateBoard.map((v,i) => v ? null : i).filter(v => v !== null);
    if(!free.length) return end('Draw.');
    const pick = free[Math.floor(Math.random() * free.length)];
    stateBoard[pick] = 'X';
    render();
    if(check('X')) return end('Makalina wins.');
    if(stateBoard.every(Boolean)) return end('Draw.');
  };

  cells.forEach((cell, i) => {
    cell.addEventListener('click', () => {
      if(over || stateBoard[i]) return;
      stateBoard[i] = 'O';
      render();
      if(check('O')){
        end('You win.');
        return;
      }
      if(stateBoard.every(Boolean)){
        end('Draw.');
        return;
      }
      status.textContent = 'Makalina is thinking...';
      setTimeout(aiMove, 280);
    });
  });

  $('#tttReset').addEventListener('click', () => {
    stateBoard = Array(9).fill('');
    over = false;
    status.textContent = 'Click a square to start.';
    render();
  });

  render();
}

function wireEvents(){
  els.newConvBtn.addEventListener('click', () => {
    const conv = createConversation('New conversation');
    state.activeId = conv.id;
    saveState();
    renderAll();
  });

  els.clearBtn.addEventListener('click', () => {
    state.conversations = [];
    state.activeId = null;
    saveState();
    renderAll();
  });

  els.themeSelect.addEventListener('change', () => setTheme(els.themeSelect.value));

  els.personaSelect.addEventListener('change', () => {
    const conv = activeConversation();
    if(!conv) return;
    if(conv.persona === 'makalina' && els.personaSelect.value !== 'makalina'){
      // allow switching away, unlock theme again
      conv.persona = els.personaSelect.value;
      saveState();
      renderAll();
      return;
    }
    conv.persona = els.personaSelect.value;
    saveState();
    renderAll();
  });

  els.homeSendBtn.addEventListener('click', () => {
    const value = els.homeInput.value.trim();
    if(!value) return;
    const conv = createConversation('New conversation');
    state.activeId = conv.id;
    saveState();
    renderAll();
    sendMessage(value);
  });

  els.sendBtn.addEventListener('click', () => {
    const value = els.messageInput.value.trim();
    if(!value) return;
    sendMessage(value);
  });

  [els.homeInput, els.messageInput].forEach(t => {
    t.addEventListener('input', () => autoGrow(t));
    t.addEventListener('keydown', e => {
      if(e.key === 'Enter' && !e.shiftKey){
        e.preventDefault();
        const value = t.value.trim();
        if(!value) return;
        if(t === els.homeInput){
          const conv = createConversation('New conversation');
          state.activeId = conv.id;
          saveState();
          renderAll();
        }
        sendMessage(value);
      }
    });
  });

  document.querySelectorAll('.suggestion').forEach(btn => {
    btn.addEventListener('click', () => {
      const prompt = btn.dataset.prompt || btn.textContent || '';
      els.homeInput.value = prompt;
      autoGrow(els.homeInput);
    });
  });

  els.newsBtn.addEventListener('click', openNewsPopup);
  els.makalinaLaunchBtn.addEventListener('click', openMakalinaLaunch);
  els.tttBtn.addEventListener('click', openTicTacToe);

  els.modalRoot.addEventListener('click', (e) => {
    if(e.target.matches('[data-close]')){
      closeModal();
    }
  });
}

init();
</script>
</body>
</html>
