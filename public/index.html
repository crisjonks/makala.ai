<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>makala.ai</title>
<link id="favicon" rel="icon" href="/makala.ico" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- libs -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

<style>
/* ---------- reset & vars ---------- */
*{box-sizing:border-box}
:root{
  --font:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
  --bg1:#0a0015; --bg2:#1b001f;
  --accent-a:#ff49a0; --accent-b:#ff7fcf;
  --muted:#b9a9b7;
  --user-a:#200023; --user-b:#0b0012;
  --bot-bg: rgba(255,255,255,0.03);
}
html,body{height:100%;margin:0;font-family:var(--font);background:linear-gradient(180deg,var(--bg1),var(--bg2));color:#fff;overflow-x:hidden}
body{display:flex;align-items:center;justify-content:center;padding:24px}

/* App layout */
.app{width:980px;max-width:calc(100% - 40px);height:720px;display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start}

/* Sidebar */
.sidebar{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.008));border-radius:12px;padding:12px;height:100%;display:flex;flex-direction:column;box-shadow:0 12px 30px rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.03)}
.header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.brand{display:flex;align-items:center;gap:8px}
.brand img{width:28px;height:28px;border-radius:6px}
.brand h1{margin:0;font-size:15px}

/* conv list */
.conv-list{flex:1;overflow:auto;display:flex;flex-direction:column;gap:8px;padding-right:6px}
.conv{display:flex;align-items:center;gap:8px;padding:8px;border-radius:10px;cursor:pointer;color:var(--muted);transition:background .12s}
.conv.active{background:linear-gradient(90deg, rgba(255,255,255,0.015), rgba(255,255,255,0.01));color:#fff}
.conv .title{font-size:13px}
.conv .meta{font-size:11px;color:var(--muted)}

/* top right controls inside sidebar */
.sidebar .controls{margin-top:8px;display:flex;flex-direction:column;gap:8px}

/* Main panel */
.panel{background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.006));border-radius:12px;padding:12px;height:100%;display:flex;flex-direction:column;box-shadow:0 12px 30px rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.03);overflow:hidden}
.header-panel{display:flex;align-items:center;gap:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.03)}
.header-panel .brand{gap:10px}
.header-panel h2{margin:0;font-size:16px}
.header-panel .right{margin-left:auto;display:flex;gap:8px;align-items:center}

/* messages */
.messages-wrap{flex:1;overflow:auto;padding:12px 14px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;overflow-x:hidden}
.bot-card{max-width:88%;display:flex;flex-direction:column;gap:6px;align-items:flex-start}
.bot-meta{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}
.bot-meta img{width:18px;height:18px;border-radius:6px}
.bot-label{font-weight:600;color:#fff;font-size:13px}
.meta-copy{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;padding:3px;border-radius:6px;background:rgba(255,255,255,0.03);cursor:pointer;transition:transform .12s}
.meta-copy img{width:14px;height:14px}

/* bot content (no outer bubble) */
.bot-body{padding:0;color:#fff;white-space:pre-wrap;line-height:1.2;font-size:14px;position:relative;overflow:visible;word-break:break-word;margin:0}

/* user bubble */
.row-user{display:flex;justify-content:flex-end;align-items:flex-end;width:100%}
.user-bubble{background:linear-gradient(90deg,var(--user-a),var(--user-b));color:#ffdff4;padding:10px 14px;border-radius:14px 14px 6px 14px;max-width:60%;min-width:80px;box-shadow:0 6px 18px rgba(0,0,0,0.6);position:relative;white-space:pre-wrap;line-height:1.2;font-size:14px;overflow-wrap:break-word;margin-left:auto}
.copy-user{position:absolute;right:-36px;top:6px;width:20px;height:20px;padding:3px;border-radius:6px;background:rgba(255,255,255,0.02);opacity:0;transition:opacity .12s}
.row-user:hover .copy-user{opacity:1}

/* typing animation dots */
.typing{display:inline-flex;gap:8px;padding:6px 8px;border-radius:10px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.36);animation:blink 1s infinite}
.dot:nth-child(2){animation-delay:.12s}.dot:nth-child(3){animation-delay:.24s}
@keyframes blink{0%{opacity:.25}50%{opacity:1}100%{opacity:.25}}

/* typing star placed like period (lowered) */
.typing-star{display:inline-block;width:16px;height:16px;vertical-align:baseline;margin-left:6px;opacity:0;transform:translateY(4px) scale(.9);transition:opacity .16s,transform .16s}
.typing-star.visible{opacity:1;transform:translateY(0) scale(1)}

/* code block & copy */
pre.code-block{position:relative;background:#0b0b10;padding:12px;border-radius:8px;overflow:auto;margin:8px 0;font-family:ui-monospace,Menlo,Monaco,'Roboto Mono',monospace;font-size:13px;color:#e6edf3}
.copy-code{position:absolute;right:8px;top:8px;width:26px;height:26px;padding:4px;border-radius:6px;cursor:pointer;background:rgba(255,255,255,0.03)}
.copy-code img{width:16px;height:16px}

/* input */
.input-area{padding:12px;border-top:1px solid rgba(255,255,255,0.03);display:flex;align-items:center;gap:10px}
.input-wrap{position:relative;flex:1}
textarea.input{width:100%;min-height:44px;max-height:200px;resize:none;padding:12px 58px 12px 12px;border-radius:12px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:#fff;font-size:14px;line-height:1.25}
textarea.input:focus{box-shadow:0 12px 28px rgba(255,73,160,0.08);transform:translateY(-1px)}
.send-circle{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:100px;display:flex;align-items:center;justify-content:center;background:linear-gradient(90deg,var(--accent-a),var(--accent-b));border:none;cursor:pointer;box-shadow:0 12px 30px rgba(0,0,0,0.4);display:none}
.input-wrap.ready .send-circle{display:flex}

/* theme select (small) */
.theme-select{background:rgba(0,0,0,0.45);color:#fff;border-radius:10px;padding:8px 10px;border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(10px);cursor:pointer}

/* modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:90}
.modal{width:540px;max-width:calc(100% - 32px);background:linear-gradient(180deg,#0b0712,#0f0716);padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.04);box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.modal img.full{width:100%;height:auto;border-radius:8px;margin:8px 0}
.modal .row{display:flex;gap:8px;align-items:center;margin-bottom:8px}

/* reset button */
.reset-btn{position:fixed;right:18px;bottom:18px;z-index:60;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.02);color:#fff;border:1px solid rgba(255,255,255,0.04);cursor:pointer}
</style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="header"><div class="brand"><img src="makala.png" alt="m"><h1>makala.ai</h1></div></div>

      <div class="controls">
        <button id="newConv" class="new-btn">New</button>
        <button id="makalinaBtn" style="display:none;border:0;background:transparent;padding:0;margin-top:8px"><img src="makalina.png" style="width:100%;height:44px;object-fit:contain;border-radius:6px" alt="makalina"></button>
        <button id="playTtt" style="display:none;margin-top:8px" class="new-btn">Play Tic Tac Toe</button>
      </div>

      <div class="conv-list" id="convList"></div>
      <div style="margin-top:8px;font-size:12px;color:var(--muted)">Tip: click a convo to open. Trash icon deletes.</div>
    </aside>

    <main class="panel">
      <div class="header-panel">
        <div class="brand"><img id="brandImg" src="makala.png" alt="m"><h2 id="convTitle">New conversation</h2></div>
        <div class="right">
          <select id="convPersonality" class="theme-select">
            <option value="makala">makala</option>
            <option value="serious">serious</option>
            <option value="makalina">makalina ai</option>
          </select>
        </div>
      </div>

      <div class="messages-wrap" id="messages" role="log"></div>

      <div class="input-area">
        <div class="input-wrap" id="inputWrap">
          <textarea id="input" class="input" placeholder="ask me anything..." rows="1" spellcheck="false"></textarea>
          <div class="send-circle" id="sendBtn" title="Send"><img src="send-circle.png" width="18" height="18" alt="send"></div>
        </div>
      </div>
    </main>
  </div>

  <div id="modalRoot"></div>
  <button id="resetBtn" class="reset-btn">Reset (temp)</button>

<script>
/* ---------- lightweight utilities ---------- */
const $ = (s, r=document) => r.querySelector(s);
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const rtrim = s => String(s||'').replace(/\r/g,'').replace(/\n+$/,'');
const sanitize = html => DOMPurify.sanitize(html);

/* ---------- app state ---------- */
let convs = JSON.parse(localStorage.getItem('makala_convs') || '[]'); if(!Array.isArray(convs)) convs=[];
let activeConv = localStorage.getItem('makala_activeConv') || (convs[0]?.id || null);
let settings = {
  makalinaOwned: localStorage.getItem('makala_owned') === '1',
  userName: localStorage.getItem('makala_user') || '',
  coins: Number(localStorage.getItem('makala_coins') || 0),
  pfpData: localStorage.getItem('makala_pfp') || null
};
const msgWrap = $('#messages'), convListEl = $('#convList'), input = $('#input'), inputWrap = $('#inputWrap'), sendBtn = $('#sendBtn'), convTitle = $('#convTitle'), brandImg = $('#brandImg');
const makalinaBtn = $('#makalinaBtn'), playTtt = $('#playTtt'), convPersonality = $('#convPersonality');

function saveConvs(){ localStorage.setItem('makala_convs', JSON.stringify(convs)); }
function saveActive(){ localStorage.setItem('makala_activeConv', activeConv || ''); }
function saveSettings(){ localStorage.setItem('makala_owned', settings.makalinaOwned ? '1' :'0'); localStorage.setItem('makala_user', settings.userName || ''); localStorage.setItem('makala_coins', String(settings.coins||0)); if(settings.pfpData) localStorage.setItem('makala_pfp', settings.pfpData); }

/* ---------- initialize defaults ---------- */
if(convs.length === 0){
  convs.push({ id: uid(), title:'New conversation', created: Date.now(), messages: [], personality:'makala' });
  activeConv = convs[0].id;
  saveConvs(); saveActive();
}
if(!activeConv) activeConv = convs[0].id;

/* apply favicon depending on ownership */
(function initFavicon(){
  const f = document.getElementById('favicon');
  f.href = settings.makalinaOwned ? '/makalina.ico' : '/makala.ico';
})();

/* theme */
(function initTheme(){
  const t = localStorage.getItem('makala_theme') || 'pink';
  document.body.className = 'theme-'+t;
  const ts = document.querySelectorAll('.theme-select');
  ts.forEach(s => s.value = t);
})();
$('.theme-select')?.addEventListener?.('change', (e)=> { const v=e.target.value; document.body.className='theme-'+v; localStorage.setItem('makala_theme', v); });

/* ---------- render conv list ---------- */
function relativeTime(ts){
  const now = Date.now(), s = Math.floor((now-ts)/1000);
  if(s<60) return 'just now'; if(s<3600) return Math.floor(s/60)+'m ago';
  const dNow = new Date(), dTs = new Date(ts);
  if(dNow.toDateString() === dTs.toDateString()) return 'Today';
  const yesterday = new Date(now - 86400000);
  if(yesterday.toDateString() === dTs.toDateString()) return 'Yesterday';
  const days = Math.floor(s/86400); if(days < 7) return days+'d ago';
  if(days < 30) return Math.floor(days/7)+'w ago';
  const yrs = Math.floor(days/365); if(yrs===1) return 'A year ago'; if(yrs>1) return 'A long time ago';
  return Math.floor(days/30)+'mo ago';
}

function renderConvList(){
  convListEl.innerHTML = '';
  convs.forEach(c=>{
    const el = document.createElement('div'); el.className='conv'+(c.id===activeConv?' active':''); el.dataset.id=c.id;
    const icon = document.createElement('img'); icon.src = (c.personality === 'makalina' ? 'linastar.png' : 'makala.png'); icon.style.width='28px'; icon.style.height='28px'; icon.style.borderRadius='6px';
    const meta = document.createElement('div'); meta.innerHTML = `<div class="title">${sanitize(c.title||'New conversation')}</div><div class="meta">${relativeTime(c.created||Date.now())}</div>`;
    const trash = document.createElement('img'); trash.src='trash.png'; trash.style.width='18px'; trash.style.marginLeft='auto'; trash.style.cursor='pointer';
    el.appendChild(icon); el.appendChild(meta); el.appendChild(trash);
    convListEl.appendChild(el);
    el.addEventListener('click', (ev)=>{
      if(ev.target === trash){ if(confirm('Delete this conversation?')) deleteConv(c.id); return; }
      setActive(c.id);
    });
  });
}

/* ---------- conversation handling ---------- */
function createConv(title='New conversation'){ const c={ id:uid(), title:title||'New conversation', created:Date.now(), messages:[], personality:'makala' }; convs.unshift(c); saveConvs(); renderConvList(); setActive(c.id); return c; }
function deleteConv(id){ convs = convs.filter(x=>x.id!==id); if(activeConv===id) activeConv = convs[0]?.id || null; saveConvs(); saveActive(); renderConvList(); if(!activeConv) createConv('New conversation'); setActive(activeConv); }
function setActive(id){
  activeConv = id; saveActive(); renderConvList();
  const conv = convs.find(x=>x.id===id); if(!conv) return;
  convTitle.textContent = conv.title || 'New conversation'; convPersonality.value = conv.personality || 'makala';
  brandImg.src = conv.personality === 'makalina' ? 'linastar.png' : 'makala.png';
  // incremental render: clear and render all messages (keeps simple & stable)
  msgWrap.innerHTML = '';
  conv.messages.forEach(m => appendMessageToDOM(conv,m,false));
  msgWrap.scrollTop = msgWrap.scrollHeight;
}

/* ---------- message DOM ---------- */
function appendMessageToDOM(conv, m, animate = false){
  if(m.role === 'user'){
    const row = document.createElement('div'); row.className='row-user';
    const bubble = document.createElement('div'); bubble.className='user-bubble'; bubble.textContent = rtrim(m.content||'');
    const copy = document.createElement('img'); copy.src='copy.png'; copy.className='copy-user'; copy.style.width='18px'; copy.style.height='18px';
    copy.addEventListener('click', ()=> navigator.clipboard.writeText(m.content||''));
    bubble.appendChild(copy);
    row.appendChild(bubble); if(animate) bubble.classList.add('user-appear');
    msgWrap.appendChild(row);
    msgWrap.scrollTop = msgWrap.scrollHeight;
    return;
  }

  // assistant
  const cont = document.createElement('div'); cont.className='bot-card';
  const meta = document.createElement('div'); meta.className='bot-meta';
  const small = document.createElement('img'); small.src = (conv.personality==='makalina' ? 'linastar.png' : 'makala.png'); small.style.width='18px'; small.style.height='18px';
  const label = document.createElement('div'); label.className='bot-label'; label.textContent = conv.personality === 'makalina' ? 'makalina ai' : 'makala ai';
  const metaCopy = document.createElement('div'); metaCopy.className='meta-copy'; metaCopy.title='copy'; metaCopy.innerHTML = `<img src="copy.png" alt="copy">`;
  metaCopy.addEventListener('click', ()=> navigator.clipboard.writeText(m.content||''));
  meta.appendChild(small); meta.appendChild(label); meta.appendChild(metaCopy);

  const body = document.createElement('div'); body.className='bot-body';
  cont.appendChild(meta); cont.appendChild(body);
  msgWrap.appendChild(cont);
  msgWrap.scrollTop = msgWrap.scrollHeight;

  // reveal with per-char animation if animate true, else render directly
  if(animate){
    typeInto(body, rtrim(m.content||''), conv);
  } else {
    body.innerHTML = sanitizeAndTrim(marked.parse(rtrim(m.content||'')));
    renderMathInElement(body);
    attachCodeCopyButtons(body);
  }
}

/* sanitize & trim trailing empty nodes */
function sanitizeAndTrim(html){
  const clean = DOMPurify.sanitize(html);
  const wrapper = document.createElement('div'); wrapper.innerHTML = clean;
  while(wrapper.lastChild && isEmptyNode(wrapper.lastChild)) wrapper.removeChild(wrapper.lastChild);
  return wrapper.innerHTML;
}
function isEmptyNode(node){
  if(!node) return true;
  if(node.nodeType === Node.TEXT_NODE) return !node.textContent.trim();
  if(node.nodeType === Node.ELEMENT_NODE){
    const tag = node.tagName.toLowerCase(); if(tag === 'br') return true;
    if(!node.textContent.trim() && node.querySelectorAll('img,svg,code,pre').length === 0) return true;
  }
  return false;
}

/* typing star helpers */
function attachStar(container, conv){
  let s = container.querySelector('.typing-star');
  if(!s){
    s = document.createElement('span'); s.className='typing-star';
    const img = document.createElement('img'); img.src = conv.personality==='makalina' ? 'linastar.png' : 'star.png'; img.style.width='100%'; img.style.height='100%';
    s.appendChild(img);
    container.appendChild(s);
  } else {
    const img = s.querySelector('img'); if(img) img.src = conv.personality==='makalina' ? 'linastar.png' : 'star.png';
  }
  return s;
}

/* per-character reveal (simple, stable) */
async function typeInto(container, text, conv){
  container.dataset.animating = '1';
  container.innerHTML = '';
  const total = text.length || 1;
  const base = Math.max(4, Math.min(18, 110 / Math.sqrt(total)));
  let buffer = '';
  for(let i=0;i<text.length;i++){
    buffer += text[i];
    // flush at small chunks or punctuation
    if(i%6 === 0 || /[.!?\n]/.test(text[i]) || i===text.length-1){
      container.innerHTML = sanitizeAndTrim(marked.parse(rtrim(buffer)));
      renderMathInElement(container);
      attachCodeCopyButtons(container);
      const s = attachStar(container, conv); s.classList.add('visible');
      await new Promise(r=>setTimeout(r, base + Math.random()*base));
    } else {
      await new Promise(r=>setTimeout(r, base));
    }
    msgWrap.scrollTop = msgWrap.scrollHeight;
  }
  // finalize
  container.innerHTML = sanitizeAndTrim(marked.parse(rtrim(text)));
  renderMathInElement(container); attachCodeCopyButtons(container);
  const finalStar = attachStar(container, conv);
  finalStar.classList.add('visible');
  await new Promise(r=>setTimeout(r,1500));
  if(!finalStar.matches(':hover')) finalStar.classList.remove('visible');
  finalStar.addEventListener('mouseenter', ()=> finalStar.classList.add('visible'));
  finalStar.addEventListener('mouseleave', ()=> finalStar.classList.remove('visible'));
  delete container.dataset.animating;
}

/* attach copy buttons to code blocks */
function attachCodeCopyButtons(container){
  const pres = container.querySelectorAll('pre');
  pres.forEach(pre=>{
    if(pre.querySelector('.copy-code')) return;
    const btn = document.createElement('div'); btn.className='copy-code'; btn.title='copy'; btn.innerHTML = `<img src="copy.png" alt="copy">`;
    btn.addEventListener('click', ()=> { const code = pre.querySelector('code'); if(code) navigator.clipboard.writeText(code.textContent); btn.style.opacity=.6; setTimeout(()=>btn.style.opacity=1,300); });
    pre.appendChild(btn);
  });
}

/* math rendering */
function renderMathInElement(el){
  let html = el.innerHTML;
  html = html.replace(/\$\$([\s\S]+?)\$\$/g, (_, expr)=> `<span class="katex-display" data-katex="${encodeURIComponent(expr)}"></span>`);
  html = html.replace(/\$([^\$]+?)\$/g, (_, expr)=> `<span class="katex-inline" data-katex="${encodeURIComponent(expr)}"></span>`);
  el.innerHTML = html;
  const nodes = el.querySelectorAll('[data-katex]');
  nodes.forEach(node=>{
    const expr = decodeURIComponent(node.getAttribute('data-katex'));
    try{ katex.render(expr, node, { throwOnError:false, displayMode: node.classList.contains('katex-display') }); } catch(e){ node.textContent = expr; }
    node.removeAttribute('data-katex');
  });
}

/* ---------- sanitize server reply helper ---------- */
function normalizeReply(data){
  if(!data) return '';
  if(typeof data === 'string') return data;
  if(data.reply && typeof data.reply === 'string') return data.reply;
  if(data.choices && data.choices[0]){ const c = data.choices[0]; return c.message?.content || c.text || ''; }
  if(data.raw && data.raw.choices && data.raw.choices[0]){ const c = data.raw.choices[0]; return c.message?.content || c.text || ''; }
  return String(data);
}

/* ---------- server comms ---------- */
async function sendToServer(payload){
  const r = await fetch('/api/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

/* ---------- send flow ---------- */
async function handleSend(){
  const raw = input.value; const trimmed = rtrim(raw);
  if(!trimmed.trim()){ input.classList.add('shake'); input.focus(); setTimeout(()=> input.classList.remove('shake'),320); return; }
  const conv = convs.find(c=>c.id===activeConv); if(!conv) return;
  // save user
  const userMsg = { role:'user', content: rtrim(raw), created: Date.now() };
  conv.messages.push(userMsg); saveConvs(); appendMessageToDOM(conv, userMsg, true);
  input.value=''; inputWrap.classList.remove('ready'); input.style.height='auto';

  // placeholder assistant typing
  conv.messages.push({ role:'assistant', content:'', temp:true, created:Date.now() }); saveConvs();
  const typingNode = document.createElement('div'); typingNode.className='bot-card'; typingNode.id='__typing_row';
  typingNode.innerHTML = `<div class="bot-meta"><img src="${conv.personality==='makalina'?'linastar.png':'makala.png'}"><div class="bot-label">${conv.personality==='makalina'?'makalina ai':'makala ai'}</div><div class="meta-copy"><img src="copy.png"></div></div><div class="bot-body"><span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span></div>`;
  msgWrap.appendChild(typingNode); msgWrap.scrollTop = msgWrap.scrollHeight;

  // payload (system + conv messages except temp)
  const messages = [{ role:'system', content: systemPrompt(conv) }, ...conv.messages.filter(m => !m.temp).map(m => ({ role:m.role, content:m.content }))];
  try{
    const data = await sendToServer({ messages, model: localStorage.getItem('makala_model') || undefined });
    const reply = normalizeReply(data) || 'no response.';
    // commit reply
    conv.messages = conv.messages.filter(m=>!m.temp);
    conv.messages.push({ role:'assistant', content: reply, created: Date.now() });
    saveConvs();
    const tr = document.getElementById('__typing_row'); if(tr) tr.remove();
    appendMessageToDOM(conv, { role:'assistant', content: reply }, true);
    // generate title from first user message if default
    if(!conv.title || conv.title === 'New conversation'){
      const first = conv.messages.find(m=>m.role==='user' && (m.content||'').trim().length>0);
      if(first){ conv.title = first.content.split(/\s+/).slice(0,6).join(' ').slice(0,60); saveConvs(); renderConvList(); convTitle.textContent = conv.title; document.title = conv.title; }
    }
  }catch(err){
    console.error(err);
    const tr = document.getElementById('__typing_row'); if(tr) tr.remove();
    conv.messages = conv.messages.filter(m=>!m.temp);
    conv.messages.push({ role:'assistant', content: 'Error: ' + String(err), created: Date.now() });
    saveConvs(); appendMessageToDOM(conv, { role:'assistant', content: 'Error: ' + String(err) }, true);
  }
}

/* system prompt per-conv */
function systemPrompt(conv){
  const baseMak = `You are Makala (female). Casual internet slang: lowercase except first word, playful, use 'lol','fr','so','like','bro', sometimes 'beta'. Short replies (1-3 sentences).`;
  const baseSer = `You are Makala (female). Speak professionally, clearly, and in full sentences.`;
  const baseLina = `You are Makalina (female). Mature, witty, creative humor, polished but playful.`;
  const persona = conv.personality || 'makala';
  const note = settings.userName ? ` When addressing the user call them ${settings.userName}.` : '';
  return (persona === 'serious' ? baseSer : (persona === 'makalina' ? baseLina : baseMak)) + note;
}

/* tic tac toe: simple polished client side */
function openTicTacToe(){
  // if not owned, prompt to demo (same modal)
  if(!settings.makalinaOwned){
    openMakalinaModal(); return;
  }

  const modalRoot = $('#modalRoot');
  modalRoot.innerHTML = `<div class="modal-backdrop"><div class="modal" id="tttModal">
    <h3>Play Tic Tac Toe vs Makala</h3>
    <div id="tttBoard" style="display:grid;grid-template-columns:repeat(3,100px);gap:8px;justify-content:center;margin:12px 0"></div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button id="tttReset" class="new-btn">Reset</button>
      <button id="tttClose" class="new-btn">Close</button>
    </div>
    <div style="margin-top:8px;color:var(--muted)">Win = gain random coins (1-50). Lose = lose random coins.</div>
  </div></div>`;

  const boardEl = $('#tttBoard'); const cells = new Array(9).fill(null);
  let player = 'O'; let ai = 'X'; // player always O, ai X (star can be used as X image when rendering)
  let ended = false;

  function renderBoard(){
    boardEl.innerHTML = '';
    for(let i=0;i<9;i++){
      const el = document.createElement('div'); el.style.width='100px'; el.style.height='100px'; el.style.display='flex'; el.style.alignItems='center'; el.style.justifyContent='center';
      el.style.background='linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005))';
      el.style.border='1px solid rgba(255,255,255,0.04)'; el.style.borderRadius='8px'; el.style.fontSize='32px';
      el.style.cursor = cells[i] ? 'default' : 'pointer';
      el.textContent = cells[i] || '';
      el.addEventListener('click', ()=> {
        if(ended || cells[i]) return;
        cells[i] = player; renderBoard();
        if(checkWin(player)){ finish(true); return; }
        if(cells.every(Boolean)){ finish(null); return; }
        // AI move (simple: choose random)
        const free = cells.map((v,idx)=> v?null:idx).filter(x=>x!==null);
        if(free.length){
          const pick = free[Math.floor(Math.random()*free.length)];
          cells[pick] = ai;
          renderBoard();
          if(checkWin(ai)){ finish(false); return; }
          if(cells.every(Boolean)){ finish(null); return; }
        }
      });
      boardEl.appendChild(el);
    }
  }

  function checkWin(sym){
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    return lines.some(l=> l.every(i=> cells[i]===sym));
  }

  function finish(playerWon){
    ended = true;
    const modal = $('#tttModal');
    if(playerWon === true){
      const gain = Math.floor(Math.random()*50)+1; settings.coins = (settings.coins||0) + gain; saveSettings();
      alert(`you win! you gained ${gain} coins.`);
    } else if(playerWon === false){
      const loss = Math.floor(Math.random()*50)+1; settings.coins = Math.max(0,(settings.coins||0) - loss); saveSettings();
      alert(`you lost. you lost ${loss} coins.`);
    } else {
      alert('draw!');
    }
  }

  $('#tttReset').addEventListener('click', ()=> { for(let i=0;i<9;i++) cells[i]=null; ended=false; renderBoard(); });
  $('#tttClose').addEventListener('click', ()=> { modalRoot.innerHTML=''; });
  renderBoard();
}
